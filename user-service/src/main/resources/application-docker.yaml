spring:
  datasource:
    url: jdbc:postgresql://user-db:5432/meditrack_userservice
    username: meditrack_user
    password: meditrack123

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth-server:9000

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka

management:
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans