services:

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      discovery-server:
        condition: service_started
      auth-server:
        condition: service_started
      user-service:
        condition: service_started
      availability-service:
        condition: service_started
      appointment-service:
        condition: service_started
      logstash:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  auth-server:
    build: ./auth-server
    container_name: auth-server
    depends_on:
      discovery-server:
        condition: service_started
      logstash:
        condition: service_started
      auth-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped
  auth-db:
    image: postgres:16
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    container_name: auth-db
    environment:
      POSTGRES_DB: meditrack_authserver
      POSTGRES_USER: meditrack_user
      POSTGRES_PASSWORD: meditrack123
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U meditrack_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      discovery-server:
        condition: service_started
      logstash:
        condition: service_started
      user-db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  user-db:
    image: postgres:16
    volumes:
      - user-db-data:/var/lib/postgresql/data
    container_name: user-db
    environment:
      POSTGRES_DB: meditrack_userservice
      POSTGRES_USER: meditrack_user
      POSTGRES_PASSWORD: meditrack123
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U meditrack_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  availability-service:
    build: ./availability-service
    container_name: availability-service
    depends_on:
      discovery-server:
        condition: service_started
      logstash:
        condition: service_started
      auth-server:
        condition: service_started
      availability-db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  availability-db:
    image: postgres:16
    volumes:
      - availability-db-data:/var/lib/postgresql/data
    container_name: availability-db
    environment:
      POSTGRES_DB: meditrack_availabilityservice
      POSTGRES_USER: meditrack_user
      POSTGRES_PASSWORD: meditrack123
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U meditrack_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  appointment-service:
    build: ./appointment-service
    container_name: appointment-service
    depends_on:
      discovery-server:
        condition: service_started
      logstash:
        condition: service_started
      auth-server:
        condition: service_started
      availability-service:
        condition: service_started
      appointment-db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  appointment-db:
    image: postgres:16
    volumes:
      - appointment-db-data:/var/lib/postgresql/data
    container_name: appointment-db
    environment:
      POSTGRES_DB: meditrack_appointmentservice
      POSTGRES_USER: meditrack_user
      POSTGRES_PASSWORD: meditrack123
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U meditrack_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      discovery-server:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: logstash
    ports:
      - "5044:5044"
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api-gateway
      - auth-server
      - user-service
      - appointment-service
      - availability-service

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

volumes:
  auth-db-data:
  user-db-data:
  availability-db-data:
  appointment-db-data:


